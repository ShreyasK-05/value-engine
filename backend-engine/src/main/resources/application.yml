spring:
  application:
    name: backend-engine
  datasource:
    url: jdbc:postgresql://localhost:5435/valueengine
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true