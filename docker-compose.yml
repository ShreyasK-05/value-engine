version: '3.8'

services:
  # 1. Apache Kafka: Native KRaft Mode (No Zookeeper required)
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: valueengine_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # 2. PostgreSQL: The ACID-compliant permanent database
  postgres:
    image: postgres:15-alpine
    container_name: valueengine_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: valueengine
    ports:
      - "5435:5432"
    volumes:
      # This ensures data isn't deleted when the container restarts
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 3. Redis: The high-speed RAM cache
  redis:
    image: redis:7-alpine
    container_name: valueengine_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

# Declare the persistent volumes for services
volumes:
  postgres_data:
  kafka_data: